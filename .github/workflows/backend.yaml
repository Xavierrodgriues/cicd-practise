name: CI CD
on: 
  push:
    branches: 
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: getting code
        uses: actions/checkout@v3

      - name: setting up node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: installing dependencies
        run: npm install
        working-directory: backend

      - name: running tests
        run: npm test
        working-directory: backend
      
      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
      
      - name: docker image building
        run: docker build -t my-app:${{ env.IMAGE_TAG }} .
        working-directory: backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Tag Docker image
        run: docker tag my-app:${{ env.IMAGE_TAG }} public.ecr.aws/p6n8j9l8/my-app:${{ env.IMAGE_TAG }}

      - name: Push Docker image
        run: docker push public.ecr.aws/p6n8j9l8/my-app:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
          --cluster my-app-cluster \
          --service my-app-task-service-eiegdvef \
          --force-new-deployment